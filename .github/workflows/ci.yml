name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          path: anonimizator3000

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Configure GitHub dependency auth
        env:
          POSEJDON_READ_TOKEN: ${{ secrets.POSEJDON_READ_TOKEN }}
        run: |
          if [ -z "$POSEJDON_READ_TOKEN" ]; then
            echo "POSEJDON_READ_TOKEN secret is required while mikolaj92/Posejdon is private." >&2
            exit 1
          fi
          git config --global url."https://x-access-token:${POSEJDON_READ_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: uv sync --dev
        working-directory: anonimizator3000

      - name: Lint
        run: uv run ruff check .
        working-directory: anonimizator3000

      - name: Test
        run: uv run pytest
        working-directory: anonimizator3000
